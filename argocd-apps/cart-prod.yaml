apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cart-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: roboshop-prod
  source:
    repoURL: https://github.com/aartidevops/roboshop-gitops
    targetRevision: main
    path: charts/roboshop
    helm:
      valueFiles:
        - ../../environments/prod/cart-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: roboshop-prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=false