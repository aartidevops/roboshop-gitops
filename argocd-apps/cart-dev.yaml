apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cart-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: roboshop-dev
  source:
    repoURL: https://github.com/aartidevops/roboshop-gitops
    targetRevision: main
    path: charts/roboshop
    helm:
      valueFiles:
        - ../../environments/dev/cart-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: roboshop-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true