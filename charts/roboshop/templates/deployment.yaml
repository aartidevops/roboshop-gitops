apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
    environment: {{ .Values.environment | default "dev" }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
      annotations:
        vault.hashicorp.com/agent-inject: {{ .Values.vault.enabled | quote }}
        vault.hashicorp.com/role: {{ .Values.vault.role | quote }}
        vault.hashicorp.com/agent-inject-status: "update"
        {{- range .Values.vault.secrets }}
        vault.hashicorp.com/agent-inject-secret-{{ .name }}: {{ .path | quote }}
        {{- if .envVars }}
        {{- $path := .path }}
        vault.hashicorp.com/agent-inject-template-{{ .name }}: |
          {{ "{{" }}- with secret "{{ $path }}" -{{ "}}" }}
          {{- range .envVars }}
          export {{ .envName }}="{{ "{{" }} .Data.data.{{ .secretKey }} {{ "}}" }}"
          {{- end }}
          {{ "{{" }}- end {{ "}}" }}
        {{- end }}
        {{- end }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: {{ .Release.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          {{- if and .Values.vault.enabled .Values.appCommand }}
          # When vault is enabled, wrap the start command to source
          # secret env var files written by vault-agent sidecar
          # before launching the actual app process.
          command: ["/bin/sh", "-c"]
          args:
            - |
              {{- range .Values.vault.secrets }}
              {{- if .envVars }}
              while [ ! -f /vault/secrets/{{ .name }} ]; do echo "waiting for vault secret: {{ .name }}..."; sleep 2; done
              . /vault/secrets/{{ .name }}
              {{- end }}
              {{- end }}
              exec {{ $.Values.appCommand }}
          {{- end }}
          env:
            - name: APP_ENV
              value: {{ .Values.environment | default "dev" | quote }}
            {{- range $key, $val := .Values.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          readinessProbe:
            httpGet:
              path: {{ .Values.healthPath | default "/health" }}
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: {{ .Values.healthPath | default "/health" }}
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3