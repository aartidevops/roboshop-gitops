apiVersion: v1
kind: Service
metadata:
  # Use serviceName value if set, otherwise fall back to Release.Name
  # This allows: catalogue-dev ArgoCD app → service named "catalogue-svc"
  # Namespace provides env isolation — no need for -dev/-uat suffix on service name
  name: {{ .Values.serviceName | default .Release.Name }}-svc
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Release.Name }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}