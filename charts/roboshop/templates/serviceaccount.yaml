# ServiceAccount is intentionally NOT managed by this Helm chart.
#
# Why: roboshop-sa is created once per namespace by Terraform (platform/main.tf).
# It is shared by ALL services (frontend, cart, catalogue etc.) in that namespace.
#
# Problem if Helm managed it:
#   - Each ArgoCD Application (frontend-dev, cart-dev, catalogue-dev) renders
#     this chart separately and tries to "own" the SA by stamping its own
#     tracking label: argocd.argoproj.io/instance: <app-name>
#   - Three apps fight over one SA → each sees a diff → permanent OutOfSync
#
# Solution: Terraform owns the SA lifecycle. ArgoCD apps just reference it
# via serviceAccountName in the Deployment spec — no ownership conflict.
