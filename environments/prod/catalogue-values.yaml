# Catalogue service — prod environment
environment: prod

image:
  repository: roboshopdevacr.azurecr.io/catalogue
  tag: "main-3c8a178"

replicaCount: 1

service:
  port: 80
  targetPort: 8080

appCommand: "node /app/server.js"
healthPath: "/health"

ingress:
  enabled: false   # catalogue is internal — no public ingress
  # frontend calls catalogue via service name

vault:
  enabled: true
  role: roboshop-prod
  secrets:
    - name: mongodb
      path: secret/data/roboshop/prod/mongodb
      envVars:
        - envName: MONGO_URL
          secretKey: uri

env:
  APP_ENV: prod
  LOG_LEVEL: debug

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

hpa:
  enabled: false   # enable later when load testing