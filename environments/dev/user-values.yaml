serviceName: user
environment: dev

image:
  repository: roboshopdevacr.azurecr.io/user
  tag: "main-50869da"

replicaCount: 1

service:
  port: 80
  targetPort: 8080

healthPath: "/health"
appCommand: "node server.js"

ingress:
  enabled: false   # user is internal — called by frontend JS

vault:
  enabled: true
  role: roboshop-dev
  secrets:
    - name: mongodb
      path: secret/data/roboshop/dev/mongodb
      envVars:
        - envName: MONGO_URL
          secretKey: uri
    - name: redis
      path: secret/data/roboshop/dev/redis
      envVars:
        - envName: REDIS_URL
          secretKey: url

env:
  APP_ENV: dev
  LOG_LEVEL: debug

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

hpa:
  enabled: false
